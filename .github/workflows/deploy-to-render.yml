name: Deploy to Render

on:
  push:
    branches:
      - main
      - devin/1784592219-cutoff-chart-models

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -fsS -X POST "$HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping Render deploy."
          fi
