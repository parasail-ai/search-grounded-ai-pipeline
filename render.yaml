services:
  - type: web
    name: you-parasail-demo
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    autoDeployTrigger: commit
    plan: free
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: EXPOSE_SOURCE
        value: "false"
      - key: ALLOW_LIVE_CLOSED
        value: "true"
    healthCheckPath: /
